<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام إدارة الطلاب</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="toast" id="toast"></div>
    <div class="container" id="auth-container">
      <div class="auth radius">
        <h1 id="form-title">login</h1>
        <div class="auth-tabs" id="auth-tabs">
          <button class="secondary" data-filter="Register" type="button">
            Register
          </button>
          <button class="secondary active" data-filter="Login" type="button">
            Login
          </button>
        </div>
        <div class="login-auth form">
          <label for="lblEmail">Email</label>
          <input type="text" name="lblEmail" id="txb-email" />
          <label for="lblPassword">Password</label>
          <input type="password" name="lblPassword" id="txb-password" />
        </div>
        <button id="form-btn" data-action="Login" type="button">Login</button>
      </div>
    </div>
    <div class="school-panel nDisplay" id="school-panel">
      <!-- Sidebar -->
      <aside class="sidebar radius">
        <div class="brand">
          <img src="images/student.png" alt="Logo" class="brand-logo" />
          <h2>SchoolSys</h2>
        </div>
        <nav class="nav-menu" id="action-panel">
          <!-- Navigation items will be injected here -->
        </nav>
        <div class="user-profile">
          <div class="user-info">
            <span id="email" class="user-email">email@example.com</span>
            <span class="pill" id="role">Role</span>
          </div>
          <button class="logout-btn" id="logout" type="button" title="Logout">
            Logout
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <header class="top-header">
          <h1 id="page-title">Dashboard</h1>
          <div class="header-actions">
            <!-- Search or extra actions can go here -->
          </div>
        </header>

        <!-- Stats Section -->
        <div class="stats-container" id="stats-container">
          <div class="stat-card blue">
            <div class="stat-info">
              <h3>Total Students</h3>
              <p class="stat-value" id="stat-students">--</p>
            </div>
            <div class="stat-icon">👥</div>
          </div>
          <div class="stat-card purple">
            <div class="stat-info">
              <h3>Active Teachers</h3>
              <p class="stat-value" id="stat-teachers">--</p>
            </div>
            <div class="stat-icon">👨‍🏫</div>
          </div>
          <div class="stat-card teal">
            <div class="stat-info">
              <h3>Classes</h3>
              <p class="stat-value" id="stat-classes">--</p>
            </div>
            <div class="stat-icon">📚</div>
          </div>
        </div>

        <div class="content-area radius">
          <div class="cards" id="cards">
            <!-- Old Cards area if needed, or repurposed -->
          </div>

          <div class="data-table-container">
            <div class="data" id="data">
              <!-- Table injects here -->
            </div>
          </div>
        </div>
      </main>

      <!-- Overlay/Modal -->
      <div id="overlay" class="overlay nDisplay">
        <div class="panel radius">
          <div class="panel-header">
            <h2 id="modal-title">Edit Check</h2>
            <span class="cancel" id="cancel">✕</span>
          </div>
          <div class="generated row" id="modal-body"></div>
          <div class="panel-footer">
            <button id="confirm" type="button">Confirm</button>
          </div>
        </div>
      </div>
    </div>

    <div class="spinner nDisplay"></div>
    <script src="script.js" defer></script>
  </body>
</html>
