<!doctype html>
<html lang="en" >
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام إدارة الطلاب</title>
    <link rel="stylesheet" href="css/style.css" />
 
  </head>
  <body>
    <div class="toast" id="toast"></div>
    <div class="container" id="auth-container" >
      <div class="auth radius">
        <h1 id="form-title">login</h1>
        <div class="auth-tabs" id="auth-tabs">
          <button class="secondary" data-filter="Register" type="button">Register</button>
          <button class="secondary active" data-filter="Login" type="button">Login</button>
        </div>
        <div class="login-auth form ">
            <label for="lblEmail">Email</label>
            <input type="text" name="lblEmail" id="txb-email">
            <label for="lblPassword">Password</label>
            <input type="password" name="lblPassword" id="txb-password" >
        </div>
        <button id="form-btn"  data-action="Login" type="button">Login</button>
      </div>
    </div>
    <div class="school-panel nDisplay" id="school-panel">
      <div class="header row radius  ">
        <div class="info row">
          <span id="email">bilal@gmail.com</span>
          <span class="pill" id="role">Admin</span>
        </div>
        <div class="action">
          <button class="danger" id="logout"  type="button">Logout</button>
        </div>
      </div>
      <div class="action-panel radius " id="action-panel"></div>
      <div class="showData radius ">
        <div class="row top">
          <div class="action">
            <button id="add-btn" type="button">Add New <span>Student</span></button>
          </div>
          <input type="text" id="search" placeholder="Search">
        </div>
        <div class="data" id="data">
  
        </div>
      </div>
      <div id="overlay" class="overlay nDisplay">
         <div class="panel radius">
        <span class="cancel" id="cancel">X</span>
        <button id="confirm" type="button">Confirm</button>
      </div>
      </div>
    </div>
   
    <div class="spinner nDisplay"></div>
    <script src="script.js" defer></script>
  </body>
</html>
